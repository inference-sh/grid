namespace: klingai
name: virtual-tryon
description: Kling Virtual Try-On - AI clothing try-on from a person photo and clothing image. Supports single items and upper+lower combos (v1.5). $0.07 per generation.
metadata:
    provider: klingai
    tags:
        - kling
        - virtual-try-on
        - fashion
        - e-commerce
category: image
env: {}
kernel: python-3.11
secrets:
    - key: KLING_ACCESS_KEY
      description: Kling AI API access key
    - key: KLING_SECRET_KEY
      description: Kling AI API secret key
resources:
    gpu:
        count: 0
        vram: 0
        type: none
    ram: 4000000000
