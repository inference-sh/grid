namespace: klingai
name: image-gen
description: Kling image generation using Kolors models. Text-to-image and image-to-image with subject/face reference. Up to 2K resolution, multiple aspect ratios, batch generation up to 9 images.
metadata:
    provider: klingai
    tags:
        - kling
        - kolors
        - image-generation
        - text-to-image
        - image-to-image
category: image
env: {}
kernel: python-3.11
secrets:
    - key: KLING_ACCESS_KEY
      description: Kling AI API access key
    - key: KLING_SECRET_KEY
      description: Kling AI API secret key
resources:
    gpu:
        count: 0
        vram: 0
        type: none
    ram: 4000000000
