namespace: falai
name: patina-text-to-material
description: Generates seamlessly tiling PBR materials up to 8K from a text prompt (optional image-to-image and inpainting) via fal.ai PATINA.
metadata:
    provider: fal-ai
    tags:
        - patina
        - pbr
        - material
        - tileable
        - texture
        - text-to-material
        - text-to-image
category: image
images:
    card: ""
    thumbnail: ""
    banner: ""
env: {}
kernel: python-3.11
secrets:
    - key: FAL_KEY
      description: fal.ai API key for model access
resources:
    gpu:
        count: 0
        vram: 0
        type: none
    ram: 4000000000
