namespace: falai
name: patina-image-to-material
description: Predicts seamless high-resolution PBR material maps (basecolor, normal, roughness, metalness, height) from a single input image via fal.ai PATINA.
metadata:
    provider: fal-ai
    tags:
        - patina
        - pbr
        - material
        - normal
        - roughness
        - basecolor
        - albedo
        - height
        - metalness
        - image-to-image
category: image
images:
    card: ""
    thumbnail: ""
    banner: ""
env: {}
kernel: python-3.11
secrets:
    - key: FAL_KEY
      description: fal.ai API key for model access
resources:
    gpu:
        count: 0
        vram: 0
        type: none
    ram: 4000000000
