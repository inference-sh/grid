namespace: bria
name: video-eraser
description: Remove objects from a video using coordinate key points to define the mask area (max 5s, 750p). Specify positive points to include in the mask and negative points to exclude. For text-based object targeting, use video-mask-by-prompt to generate the mask first.
metadata: {}
category: video
images:
    card: ""
    thumbnail: ""
    banner: ""
env: {}
kernel: python-3.11
secrets:
    - key: BRIA_KEY
      description: Bria API token
      optional: false
resources:
    gpu:
        count: 0
        vram: 0
        type: none
    ram: 4
