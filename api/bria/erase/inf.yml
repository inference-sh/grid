namespace: bria
name: erase
description: Remove objects from an image using a mask (white=erase, black=keep). For text-based removal without a mask, use erase-by-text instead. To fill the erased region with new content, use gen-fill.
metadata: {}
category: image
images:
    card: ""
    thumbnail: ""
    banner: ""
env: {}
kernel: python-3.11
secrets:
    - key: BRIA_KEY
      description: Bria API token
      optional: false
resources:
    gpu:
        count: 0
        vram: 0
        type: none
    ram: 4
