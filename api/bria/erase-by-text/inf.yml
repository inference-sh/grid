namespace: bria
name: erase-by-text
description: Erase objects from an image by naming them in text — no mask needed. The AI locates and removes the described object, reconstructing the background. For mask-based erasing, use erase instead.
metadata: {}
category: image
images:
    card: ""
    thumbnail: ""
    banner: ""
env: {}
kernel: python-3.11
secrets:
    - key: BRIA_KEY
      description: Bria API token
      optional: false
resources:
    gpu:
        count: 0
        vram: 0
        type: none
    ram: 4
