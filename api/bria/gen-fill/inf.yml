namespace: bria
name: gen-fill
description: Fill a masked region with AI-generated content guided by a text prompt (white=fill, black=keep). Unlike erase which just removes, gen-fill replaces with new content. Combine with expand to add canvas space first.
metadata: {}
category: image
images:
    card: ""
    thumbnail: ""
    banner: ""
env: {}
kernel: python-3.11
secrets:
    - key: BRIA_KEY
      description: Bria API token
      optional: false
resources:
    gpu:
        count: 0
        vram: 0
        type: none
    ram: 4
