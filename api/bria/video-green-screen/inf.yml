namespace: bria
name: video-green-screen
description: Replace a video's background with a green or blue screen for chroma keying in post-production. Supports broadcast green (#00B140), chroma green (#00FF00), and blue screen (#0000FF). Use video-rmbg first if you need transparency instead.
metadata: {}
category: video
images:
    card: ""
    thumbnail: ""
    banner: ""
env: {}
kernel: python-3.11
secrets:
    - key: BRIA_KEY
      description: Bria API token
      optional: false
resources:
    gpu:
        count: 0
        vram: 0
        type: none
    ram: 4
