namespace: bria
name: colorize
description: Add color to B&W photos (color_contemporary, sepia_vintage) or convert color photos to grayscale (decolorize). Chain with restore first to clean up old photos before colorizing.
metadata: {}
category: image
images:
    card: ""
    thumbnail: ""
    banner: ""
env: {}
kernel: python-3.11
secrets:
    - key: BRIA_KEY
      description: Bria API token
      optional: false
resources:
    gpu:
        count: 0
        vram: 0
        type: none
    ram: 4
