namespace: bria
name: enhance
description: Upscale an image with AI-enhanced detail, sharpening textures and enriching quality at 2x resolution. For pure upscaling without detail changes, use increase-resolution instead. Good as a final step after editing or generation.
metadata: {}
category: image
images:
    card: ""
    thumbnail: ""
    banner: ""
env: {}
kernel: python-3.11
secrets:
