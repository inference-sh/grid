namespace: bria
name: generate-lite
description: Low-latency image generation using Bria's lightweight Fibo Lite model. Faster than generate but lower quality — good for previews and iterations. Output can be refined with enhance or any editing app.
metadata: {}
category: image
images:
    card: ""
    thumbnail: ""
    banner: ""
env: {}
kernel: python-3.11
secrets:
    - key: BRIA_KEY
      description: Bria API token
      optional: false
resources:
    gpu:
        count: 0
        vram: 0
        type: none
    ram: 4
