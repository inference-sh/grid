namespace: bria
name: rmbg
description: Remove the background from an image, producing a transparent cutout. The general-purpose background removal — for product-specific cutouts, use product-cutout instead. Output can be passed to replace-background, blur-background, or any editing app.
metadata: {}
category: image
images:
    card: ""
    thumbnail: ""
    banner: ""
env: {}
kernel: python-3.11
secrets:
    - key: BRIA_KEY
      description: Bria API token
      optional: false
resources:
    gpu:
        count: 0
        vram: 0
        type: none
    ram: 4
