namespace: bria
name: replace-object
description: Replace an existing object in an image with something new, described in text. The AI locates the target object and swaps it while maintaining scene coherence. For background replacement, use replace-background instead.
metadata: {}
category: image
images:
    card: ""
    thumbnail: ""
    banner: ""
env: {}
kernel: python-3.11
secrets:
    - key: BRIA_KEY
      description: Bria API token
      optional: false
resources:
    gpu:
        count: 0
        vram: 0
        type: none
    ram: 4
