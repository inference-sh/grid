namespace: bria
name: product-shadow
description: Add customizable shadows to a product cutout image. Input should be a cutout with transparent background — use product-cutout first if needed. Supports regular drop shadows and floating elliptical shadows.
metadata: {}
category: image
images:
    card: ""
    thumbnail: ""
    banner: ""
env: {}
kernel: python-3.11
secrets:
    - key: BRIA_KEY
      description: Bria API token
      optional: false
resources:
    gpu:
        count: 0
        vram: 0
        type: none
    ram: 4
